name: Aggiorna Cruscotto

on:
  workflow_dispatch:
  push:
    branches:
      - data
    paths:
      - 'data/rolling.xlsx'
      - 'data/gamma.xlsx'

jobs:
  genera-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (script)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout data (file Excel)
        uses: actions/checkout@v4
        with:
          ref: data
          path: data-branch

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas openpyxl

      - name: Esegui script
        env:
          PATH_ROLLING: ${{ github.workspace }}/data-branch/data/rolling.xlsx
          PATH_GAMMA: ${{ github.workspace }}/data-branch/data/gamma.xlsx
          PATH_OUT: ${{ github.workspace }}/main/cruscotto_data.json
        run: |
          cd main
          python scripts/genera_cruscotto.py

      - name: Pubblica JSON su main
        run: |
          cd main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cruscotto_data.json
          git diff --cached --quiet || git commit -m "Aggiorna cruscotto_data.json [auto]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
