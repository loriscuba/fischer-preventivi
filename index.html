<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#E30613">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Fischer Preventivi">
<link rel="manifest" href="manifest.json">
<title>Fischer Italia – Preventivi</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --red:#E30613;--red2:#b80000;--bg:#f4f4f4;--surface:#fff;--border:#e0e0e0;
  --text:#1a1a1a;--muted:#777;--success:#2e7d32;--shadow:0 1px 6px rgba(0,0,0,0.09);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}


/* PIN SCREEN */
.pin-screen{position:fixed;inset:0;background:var(--red);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.pin-logo{margin-bottom:28px;}
.pin-title{color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;text-align:center;}
.pin-sub{color:rgba(255,255,255,0.75);font-size:0.82rem;margin-bottom:28px;text-align:center;line-height:1.5;}
.pin-dots{display:flex;gap:16px;margin-bottom:28px;}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.5);background:transparent;transition:all 0.15s;}
.pin-dot.filled{background:#fff;border-color:#fff;}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);grid-template-rows:repeat(4,64px);gap:12px;}
.pin-btn{background:rgba(255,255,255,0.15);border:none;border-radius:14px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:1.7rem;font-weight:700;cursor:pointer;transition:background 0.12s;display:flex;align-items:center;justify-content:center;}
.pin-btn:active{background:rgba(255,255,255,0.38);}
.pin-btn.zero{grid-column:2;}
.pin-btn.del{font-size:1.2rem;background:rgba(255,255,255,0.08);}
.pin-btn.del:active{background:rgba(255,255,255,0.25);}
.pin-error{color:#ffcdd2;font-size:0.82rem;margin-top:-18px;margin-bottom:14px;min-height:18px;text-align:center;}
.pin-hint{color:rgba(255,255,255,0.65);font-size:0.76rem;margin-top:18px;text-align:center;line-height:1.5;}

/* HEADER */
.header{background:var(--red);padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(227,6,19,0.35);}

/* FISCHER SVG LOGO */
.fischer-logo{display:flex;align-items:center;gap:0;}
.fischer-logo svg{height:36px;width:auto;}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:58px;z-index:190;}
.tab-btn{flex:1;padding:11px 4px;background:none;border:none;color:var(--muted);font-family:'Barlow',sans-serif;font-size:0.7rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.3px;}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red);}

/* PAGES */
.page{display:none;padding:12px;}
.page.active{display:block;}

/* CARDS */
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* FORM */
.form-group{margin-bottom:10px;}
label{display:block;font-size:0.71rem;color:var(--muted);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
input,textarea,select{width:100%;background:#f9f9f9;border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:'Barlow',sans-serif;font-size:0.9rem;padding:9px 11px;outline:none;transition:border-color 0.2s;}
input:focus,textarea:focus,select:focus{border-color:var(--red);background:#fff;}
textarea{resize:vertical;min-height:60px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* VOCI */
.voci-header{display:grid;grid-template-columns:2fr 50px 74px 74px 26px;gap:5px;padding:0 4px;margin-bottom:3px;}
.voci-header span{font-size:0.63rem;color:var(--muted);font-weight:600;text-transform:uppercase;}
.voce-row{display:grid;grid-template-columns:2fr 50px 74px 74px 26px;gap:5px;align-items:center;background:#f9f9f9;border:1.5px solid var(--border);border-radius:8px;padding:8px 6px;margin-bottom:6px;}
.voce-row input{padding:5px 7px;font-size:0.82rem;}
.voce-row input[type=number]{text-align:right;}
.voce-del{background:none;border:none;color:#cc3333;cursor:pointer;font-size:0.95rem;padding:3px;border-radius:4px;}
.voce-totale{font-size:0.8rem;font-weight:700;color:var(--text);text-align:right;}

/* CATALOGO */
.search-wrap{position:relative;margin-bottom:8px;}
.search-wrap input{padding-left:36px;}
.s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;pointer-events:none;}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:0.72rem;font-weight:600;cursor:pointer;color:var(--muted);font-family:'Barlow',sans-serif;flex-shrink:0;}
.chip.active{background:var(--red);border-color:var(--red);color:#fff;}
.prod-list{max-height:58vh;overflow-y:auto;}
.prod-item{display:flex;justify-content:space-between;align-items:center;padding:10px 11px;background:#fff;border:1.5px solid var(--border);border-radius:8px;margin-bottom:6px;}
.prod-cod{font-size:0.68rem;color:var(--muted);font-weight:700;letter-spacing:0.3px;}
.prod-nome{font-size:0.88rem;font-weight:500;margin:2px 0;}
.prod-cat{font-size:0.67rem;color:var(--muted);}
.prod-right{text-align:right;flex-shrink:0;margin-left:10px;}
.prod-price{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;color:var(--red);}
.prod-um{font-size:0.67rem;color:var(--muted);margin-bottom:4px;}
.prod-actions{display:flex;gap:4px;justify-content:flex-end;}
.prod-add{background:var(--red);color:#fff;border:none;border-radius:5px;padding:5px 9px;font-size:0.72rem;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;}
.prod-link{background:none;border:1.5px solid var(--border);border-radius:5px;padding:5px 7px;font-size:0.72rem;cursor:pointer;text-decoration:none;color:var(--muted);display:inline-flex;align-items:center;}
.no-results{text-align:center;padding:32px;color:var(--muted);font-size:0.88rem;}

/* TOTALI */
.tot-box{background:#f9f9f9;border:1.5px solid var(--border);border-radius:8px;padding:12px;margin-top:10px;}
.tot-row{display:flex;justify-content:space-between;font-size:0.87rem;padding:3px 0;}
.tot-row.big{border-top:2px solid var(--red);margin-top:6px;padding-top:8px;font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:700;color:var(--red);}
.iva-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.iva-row label{margin:0;white-space:nowrap;}
.iva-row select{max-width:155px;}
.sc-row{display:flex;align-items:center;gap:8px;}
.sc-row label{margin:0;white-space:nowrap;font-size:0.75rem;}
.sc-row input{max-width:80px;}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:5px;padding:10px 16px;border-radius:7px;border:none;font-family:'Barlow',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn-red{background:var(--red);color:#fff;}
.btn-red:active{background:var(--red2);}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--text);}
.btn-green{background:var(--success);color:#fff;}
.btn-sm{padding:7px 11px;font-size:0.78rem;}
.btn-full{width:100%;justify-content:center;}
.bactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}

/* LISTA PREVENTIVI */
.pcard{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow);}
.pcard-top{display:flex;justify-content:space-between;align-items:flex-start;}
.pnum{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;padding:2px 8px;border-radius:4px;}
.pimporto{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:700;color:var(--red);}
.ptitle{font-weight:600;font-size:0.93rem;margin:5px 0 2px;}
.psub{font-size:0.77rem;color:var(--muted);}
.pactions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:10px;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#333;color:#fff;font-weight:600;font-size:0.84rem;padding:10px 20px;border-radius:25px;z-index:9999;transition:transform 0.3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--success);}
.toast.err{background:#c62828;}

@media(max-width:360px){
  .voce-row,.voci-header{grid-template-columns:1.8fr 44px 64px 64px 22px;}
}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen" class="pin-screen" style="display:none;">
  <div class="pin-logo">
    <svg viewBox="0 0 180 40" xmlns="http://www.w3.org/2000/svg" height="44">
      <rect width="180" height="40" fill="white" rx="3"/>
      <rect width="7" height="40" fill="#E30613"/>
      <text x="14" y="28" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="20" fill="#E30613">fischer</text>
    </svg>
  </div>
  <div class="pin-title" id="pin-title">Inserisci PIN</div>
  <div class="pin-sub" id="pin-sub">Accedi alla tua area personale</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinDigit('1')">1</button>
    <button class="pin-btn" onclick="pinDigit('2')">2</button>
    <button class="pin-btn" onclick="pinDigit('3')">3</button>
    <button class="pin-btn" onclick="pinDigit('4')">4</button>
    <button class="pin-btn" onclick="pinDigit('5')">5</button>
    <button class="pin-btn" onclick="pinDigit('6')">6</button>
    <button class="pin-btn" onclick="pinDigit('7')">7</button>
    <button class="pin-btn" onclick="pinDigit('8')">8</button>
    <button class="pin-btn" onclick="pinDigit('9')">9</button>
    <button class="pin-btn zero" onclick="pinDigit('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-hint" id="pin-hint"></div>
</div>

<!-- APP (nascosta finché non autenticato) -->
<div id="app-content" style="display:none;">

<!-- HEADER con logo SVG Fischer fedele -->
<div class="header">
  <div class="fischer-logo">
    <!-- Logo Fischer: rettangolo bianco con scritta fischer in rosso + tagline -->
    <svg viewBox="0 0 220 44" xmlns="http://www.w3.org/2000/svg">
      <!-- Sfondo bianco -->
      <rect width="220" height="44" fill="white" rx="3"/>
      <!-- Barra rossa sinistra -->
      <rect width="8" height="44" fill="#E30613"/>
      <!-- Testo fischer -->
      <text x="16" y="30" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="22" fill="#E30613" letter-spacing="-0.5">fischer</text>
      <!-- Tagline -->
      <text x="16" y="41" font-family="Arial,Helvetica,sans-serif" font-size="7.5" fill="#555" letter-spacing="0.5">fixings for professionals</text>
    </svg>
  </div>
  <button class="btn btn-sm" style="background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.5);color:#fff;font-size:0.8rem" onclick="nuovoPreventivo()">+ Nuovo</button>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('lista',this)">📋 Archivio</button>
  <button class="tab-btn" onclick="showTab('editor',this)">✏️ Preventivo</button>
  <button class="tab-btn" onclick="showTab('catalogo',this)">🔍 Catalogo</button>
  <button class="tab-btn" onclick="showTab('profilo',this)">⚙️ Profilo</button>
</div>

<!-- LISTA -->
<div id="tab-lista" class="page active">
  <div id="lista-cont"></div>
</div>

<!-- EDITOR -->
<div id="tab-editor" class="page">
  <div class="card">
    <div class="card-title">📄 Preventivo</div>
    <div class="grid2">
      <div class="form-group"><label>N° Offerta</label><input type="text" id="num-prev" placeholder="FIS-0001"></div>
      <div class="form-group"><label>Data</label><input type="date" id="data-prev"></div>
    </div>
    <div class="form-group"><label>Oggetto</label><input type="text" id="ogg-prev" placeholder="es. Fornitura materiale cantiere Via Roma"></div>
  </div>

  <div class="card">
    <div class="card-title">👤 Cliente</div>
    <div class="form-group"><label>Nome / Ragione Sociale</label><input type="text" id="cl-nome" placeholder="Mario Rossi / Rossi Costruzioni srl"></div>
    <div class="grid2">
      <div class="form-group"><label>Indirizzo</label><input type="text" id="cl-ind" placeholder="Via Roma 1"></div>
      <div class="form-group"><label>Città</label><input type="text" id="cl-city" placeholder="Milano"></div>
    </div>
    <div class="grid2">
      <div class="form-group"><label>Telefono</label><input type="tel" id="cl-tel" placeholder="+39 333..."></div>
      <div class="form-group"><label>Email</label><input type="email" id="cl-email" placeholder="email@..."></div>
    </div>
    <div class="form-group"><label>P.IVA / C.F.</label><input type="text" id="cl-piva" placeholder="IT01234560967"></div>
  </div>

  <div class="card">
    <div class="card-title">🔩 Voci
      <button class="btn btn-outline btn-sm" style="margin-left:auto;font-size:0.7rem" onclick="showTab('catalogo',document.querySelectorAll('.tab-btn')[2])">+ da Catalogo</button>
    </div>
    <div class="voci-header">
      <span>Descrizione</span><span style="text-align:center">Qtà</span><span style="text-align:right">Prezzo</span><span style="text-align:right">Totale</span><span></span>
    </div>
    <div id="voci-cont"></div>
    <button class="btn btn-outline btn-sm" onclick="addVoce()" style="margin-top:4px">+ Voce manuale</button>
  </div>

  <div class="card">
    <div class="card-title">💰 Totali</div>
    <div class="iva-row">
      <label>IVA</label>
      <select id="iva-sel" onchange="calcTot()">
        <option value="0">Esente 0%</option>
        <option value="4">4% ridotta</option>
        <option value="10">10% ridotta</option>
        <option value="22" selected>22% ordinaria</option>
      </select>
    </div>
    <div class="sc-row">
      <label>Sconto globale %</label>
      <input type="number" id="sc-glob" min="0" max="100" step="0.5" value="0" oninput="calcTot()">
    </div>
    <div class="tot-box">
      <div class="tot-row"><span>Imponibile lordo</span><span id="t-lordo">€ 0,00</span></div>
      <div class="tot-row"><span id="t-sc-label">Sconto 0%</span><span id="t-sc" style="color:#c62828">- € 0,00</span></div>
      <div class="tot-row"><span>Imponibile netto</span><span id="t-imp">€ 0,00</span></div>
      <div class="tot-row"><span>IVA</span><span id="t-iva">€ 0,00</span></div>
      <div class="tot-row big"><span>TOTALE</span><span id="t-tot">€ 0,00</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📝 Note & Condizioni</div>
    <div class="form-group"><label>Note al cliente</label><textarea id="note-prev" placeholder="Tempi di consegna, condizioni speciali..."></textarea></div>
    <div class="form-group"><label>Condizioni di pagamento</label><textarea id="cond-prev" placeholder="es. Bonifico 30gg data fattura..."></textarea></div>
    <div class="form-group"><label>Validità offerta</label><input type="text" id="val-prev" placeholder="es. 30 giorni dalla data di emissione"></div>
  </div>

  <div class="bactions">
    <button class="btn btn-red" onclick="salvaPrev()">💾 Salva</button>
    <button class="btn btn-green" onclick="esportaPDF()">📤 Condividi PDF</button>
    <button class="btn btn-outline" onclick="nuovoPreventivo()">🗑 Nuovo</button>
  </div>
  <div style="height:20px"></div>
</div>

<!-- CATALOGO -->
<div id="tab-catalogo" class="page">
  <div class="card" style="padding-bottom:6px">
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input type="text" id="s-input" placeholder="Cerca codice o descrizione..." oninput="cerca()">
    </div>
    <div class="chips" id="chips-fam"></div>
  </div>
  <div class="prod-list" id="prod-list"></div>
  <div id="load-more" style="text-align:center;padding:8px;display:none">
    <button class="btn btn-outline btn-sm" onclick="loadMore()">Carica altri risultati</button>
  </div>
</div>

<!-- PROFILO -->
<div id="tab-profilo" class="page">
  <div class="card">
    <div class="card-title">👤 Il Tuo Profilo</div>
    <div class="form-group"><label>Nome Agente</label><input type="text" id="ag-nome" placeholder="Mario Bianchi"></div>
    <div class="form-group"><label>Email</label><input type="email" id="ag-email" placeholder="m.bianchi@fischer.it"></div>
    <div class="form-group"><label>Telefono</label><input type="tel" id="ag-tel" placeholder="+39 333 0000000"></div>
    <div class="form-group"><label>Area / Zona</label><input type="text" id="ag-zona" placeholder="es. Lombardia Nord"></div>
  </div>
  <div class="card">
    <div class="card-title">🏢 Dati Fischer per PDF</div>
    <div class="form-group"><label>Indirizzo</label><input type="text" id="fis-ind" value="Via Torri Bianche 1, 20871 Vimercate (MB)"></div>
    <div class="form-group"><label>Telefono</label><input type="text" id="fis-tel" value="+39 039 62011"></div>
    <div class="form-group"><label>Sito Web</label><input type="text" id="fis-web" value="www.fischer.it"></div>
    <div class="form-group"><label>P.IVA</label><input type="text" id="fis-piva" value="IT 00000000000"></div>
    <div class="form-group"><label>Condizioni standard (precompila nuovo preventivo)</label><textarea id="cond-def" rows="3" placeholder="es. Validità 30 giorni. Pagamento 30gg fattura..."></textarea></div>
  </div>
  <div class="card">
    <div class="card-title">🔢 Numerazione Automatica</div>
    <div class="grid2">
      <div class="form-group"><label>Prefisso</label><input type="text" id="n-pref" value="FIS-"></div>
      <div class="form-group"><label>Ultimo n°</label><input type="number" id="n-cnt" value="0" min="0"></div>
    </div>
  </div>
  <button class="btn btn-red btn-full" onclick="salvaProfilo()" style="margin-bottom:16px">💾 Salva Profilo</button>
</div>

<div class="toast" id="toast"></div>

let voci = [];
let currentId = null;
let filtered = [];
let shown = 0;
const PER_PAGE = 40;
let filtroFam = '';

// ===== TABS =====
function showTab(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (el) el.classList.add('active');
  if (name === 'lista') renderLista();
  if (name === 'catalogo') { initChips(); cerca(); }
}

// ===== CATALOGO =====
function initChips() {
  const c = document.getElementById('chips-fam');
  if (c.childElementCount > 0) return;
  let h = '<button class="chip active" onclick="setFam(\'\',this)">Tutti</button>';
  for (const [cod, nome] of Object.entries(FAM))
    h += `<button class="chip" onclick="setFam('${cod}',this)">${nome}</button>`;
  c.innerHTML = h;
}
function setFam(cod, el) {
  filtroFam = cod;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  cerca();
}
function cerca() {
  const q = (document.getElementById('s-input').value || '').toLowerCase().trim();
  filtered = RAW.filter(p => {
    if (filtroFam && p[6] !== filtroFam) return false;
    if (!q) return true;
    return p[0].toLowerCase().includes(q) || p[1].toLowerCase().includes(q);
  });
  shown = 0;
  renderProd(true);
}
function renderProd(reset) {
  const el = document.getElementById('prod-list');
  const slice = filtered.slice(shown, shown + PER_PAGE);
  shown += slice.length;
  if (reset) el.innerHTML = '';
  if (!filtered.length) { el.innerHTML = '<div class="no-results">Nessun prodotto trovato</div>'; document.getElementById('load-more').style.display='none'; return; }
  el.innerHTML += slice.map(p => {
    const cat = [FAM[p[6]], SUB[p[7]]].filter(Boolean).join(' › ');
    const link = `https://www.fischer.it/it-it/servizi/ricerca?query=${encodeURIComponent(p[0])}`;
    return `<div class="prod-item">
      <div>
        <div class="prod-cod">${p[0]}</div>
        <div class="prod-nome">${p[1]}</div>
        <div class="prod-cat">${cat}</div>
      </div>
      <div class="prod-right">
        <div class="prod-price">€ ${p[3].toFixed(2).replace('.',',')}</div>
        <div class="prod-um">/ ${p[2]}</div>
        <div class="prod-actions">
          <button class="prod-add" onclick="addDaCatalogo('${p[0]}','${esc(p[1])}','${p[2]}',${p[3]})">+ Aggiungi</button>
          <a class="prod-link" href="${link}" target="_blank" title="Scheda prodotto">🔗</a>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('load-more').style.display = shown < filtered.length ? 'block' : 'none';
}
function loadMore() { renderProd(false); }
function esc(s) { return String(s).replace(/'/g,"\'").replace(/"/g,'&quot;'); }
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function addDaCatalogo(cod, desc, um, prezzo) {
  addVoce(desc + ' [' + cod + ']', 1, prezzo, um);
  showTab('editor', document.querySelectorAll('.tab-btn')[1]);
  toast('✅ Aggiunto: ' + cod, 'ok');
}

// ===== VOCI =====
function addVoce(desc='', qty=1, prezzo=0, um='PZ') {
  voci.push({ id: Date.now() + Math.random(), desc, qty, prezzo, um });
  renderVoci();
}
function renderVoci() {
  document.getElementById('voci-cont').innerHTML = voci.map(v => {
    const tot = (parseFloat(v.qty)||0) * (parseFloat(v.prezzo)||0);
    return `<div class="voce-row">
      <input type="text" value="${escH(v.desc)}" placeholder="Descrizione prodotto" oninput="upV(${v.id},'desc',this.value)">
      <input type="number" value="${v.qty}" min="0" step="1" oninput="upV(${v.id},'qty',this.value)">
      <input type="number" value="${v.prezzo}" min="0" step="0.01" oninput="upV(${v.id},'prezzo',this.value)">
      <div class="voce-totale">€ ${tot.toFixed(2).replace('.',',')}</div>
      <button class="voce-del" onclick="delV(${v.id})">✕</button>
    </div>`;
  }).join('');
  calcTot();
}
function upV(id, f, val) { const v = voci.find(x => x.id===id); if(v) v[f] = f==='desc' ? val : parseFloat(val)||0; calcTot(); }
function delV(id) { voci = voci.filter(x => x.id!==id); renderVoci(); }
function calcTot() {
  const sc = parseFloat(document.getElementById('sc-glob').value)||0;
  const lordo = voci.reduce((s,v) => s + (parseFloat(v.qty)||0)*(parseFloat(v.prezzo)||0), 0);
  const sconto = lordo * sc / 100;
  const imp = lordo - sconto;
  const ivaP = parseFloat(document.getElementById('iva-sel').value)||0;
  const iva = imp * ivaP / 100;
  const tot = imp + iva;
  document.getElementById('t-lordo').textContent = fmt(lordo);
  document.getElementById('t-sc-label').textContent = 'Sconto ' + sc + '%';
  document.getElementById('t-sc').textContent = '- ' + fmt(sconto);
  document.getElementById('t-imp').textContent = fmt(imp);
  document.getElementById('t-iva').textContent = fmt(iva);
  document.getElementById('t-tot').textContent = fmt(tot);
}
function fmt(n) { return '€ ' + n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }

// ===== PREVENTIVO =====
function raccolta() {
  const sc = parseFloat(document.getElementById('sc-glob').value)||0;
  const lordo = voci.reduce((s,v) => s + (parseFloat(v.qty)||0)*(parseFloat(v.prezzo)||0), 0);
  const sconto = lordo * sc / 100;
  const imp = lordo - sconto;
  return {
    id: currentId || Date.now(),
    numero: document.getElementById('num-prev').value,
    data: document.getElementById('data-prev').value,
    oggetto: document.getElementById('ogg-prev').value,
    cliente: { nome: document.getElementById('cl-nome').value, ind: document.getElementById('cl-ind').value, city: document.getElementById('cl-city').value, tel: document.getElementById('cl-tel').value, email: document.getElementById('cl-email').value, piva: document.getElementById('cl-piva').value },
    voci: [...voci],
    iva: parseFloat(document.getElementById('iva-sel').value)||0,
    sconto: sc, note: document.getElementById('note-prev').value,
    condizioni: document.getElementById('cond-prev').value,
    validita: document.getElementById('val-prev').value,
    lordo, sconto_val: sconto, imponibile: imp
  };
}
function salvaPrev() {
  const d = raccolta();
  if (!d.cliente.nome && !d.oggetto) { toast('⚠️ Inserisci cliente o oggetto','err'); return; }
  const db = getDB();
  if (currentId) { const i = db.p.findIndex(x => x.id===currentId); if(i>=0) db.p[i]=d; }
  else { db.p.unshift(d); db.prof.nCnt = (parseInt(db.prof.nCnt)||0)+1; }
  currentId = d.id;
  saveDB(db);
  toast('✅ Preventivo salvato!','ok');
}
function nuovoPreventivo() {
  currentId = null; voci = [];
  const db = getDB();
  const pref = db.prof.nPref || 'FIS-';
  const cnt = (parseInt(db.prof.nCnt)||0) + 1;
  document.getElementById('num-prev').value = pref + String(cnt).padStart(4,'0');
  document.getElementById('data-prev').value = new Date().toISOString().split('T')[0];
  ['ogg-prev','cl-nome','cl-ind','cl-city','cl-tel','cl-email','cl-piva','note-prev','val-prev'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('cond-prev').value = db.prof.condDef || '';
  document.getElementById('sc-glob').value = '0';
  document.getElementById('iva-sel').value = '22';
  renderVoci(); addVoce();
  showTab('editor', document.querySelectorAll('.tab-btn')[1]);
}

// ===== LISTA =====
function renderLista() {
  const db = getDB();
  const el = document.getElementById('lista-cont');
  if (!db.p.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>Nessun preventivo.<br>Premi "+ Nuovo" per iniziare.</p></div>'; return; }
  el.innerHTML = db.p.map(p => {
    const tot = (p.imponibile||0) * (1 + (p.iva||0)/100);
    const dt = p.data ? new Date(p.data).toLocaleDateString('it-IT') : '—';
    return `<div class="pcard">
      <div class="pcard-top">
        <div>
          <span class="pnum">${p.numero||'---'}</span>
          <div class="ptitle">${p.oggetto||'Preventivo'}</div>
          <div class="psub">👤 ${p.cliente?.nome||'—'} &nbsp;·&nbsp; 📅 ${dt}</div>
        </div>
        <div class="pimporto">${fmt(tot)}</div>
      </div>
      <div class="pactions">
        <button class="btn btn-outline btn-sm" onclick="apriPrev(${p.id})">✏️ Modifica</button>
        <button class="btn btn-green btn-sm" onclick="pdfById(${p.id})">📄 PDF</button>
        <button class="btn btn-sm" style="background:#fde8e8;color:#c62828;border:none" onclick="delPrev(${p.id})">🗑</button>
      </div>
    </div>`;
  }).join('');
}
function apriPrev(id) {
  const db = getDB(); const p = db.p.find(x => x.id===id); if(!p) return;
  currentId = id;
  const s = (id,v) => { const el=document.getElementById(id); if(el&&v!=null) el.value=v; };
  s('num-prev',p.numero); s('data-prev',p.data); s('ogg-prev',p.oggetto);
  s('cl-nome',p.cliente?.nome); s('cl-ind',p.cliente?.ind); s('cl-city',p.cliente?.city);
  s('cl-tel',p.cliente?.tel); s('cl-email',p.cliente?.email); s('cl-piva',p.cliente?.piva);
  s('note-prev',p.note); s('cond-prev',p.condizioni); s('val-prev',p.validita);
  s('iva-sel',p.iva||22); s('sc-glob',p.sconto||0);
  voci = p.voci ? p.voci.map(v => ({...v, id: v.id||Date.now()+Math.random()})) : [];
  renderVoci();
  showTab('editor', document.querySelectorAll('.tab-btn')[1]);
}
function delPrev(id) {
  if (!confirm('Eliminare questo preventivo?')) return;
  const db = getDB(); db.p = db.p.filter(x => x.id!==id); saveDB(db); renderLista();
}

// ===== PDF =====
function esportaPDF() { generaPDF(raccolta()); }
function pdfById(id) { const db = getDB(); const p = db.p.find(x => x.id===id); if(p) generaPDF(p); }

function generaPDF(p) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const db = getDB();
  const pr = db.prof || {};
  const W = 210, M = 16;

  // ---- HEADER FISCHER ----
  // Sfondo rosso pieno
  doc.setFillColor(227, 6, 19);
  doc.rect(0, 0, W, 46, 'F');

  // Barra bianca verticale sinistra (elemento logo)
  doc.setFillColor(255, 255, 255);
  doc.rect(M, 8, 5, 30, 'F');

  // Testo "fischer" in bianco
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(28);
  doc.text('fischer', M + 9, 28);

  // Tagline
  doc.setFontSize(8);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(255, 200, 200);
  doc.text('fixings for professionals', M + 9, 36);

  // Dati azienda a destra
  doc.setFontSize(7.5);
  doc.setTextColor(255, 230, 230);
  const fisLines = [
    pr.fisInd || 'Via Torri Bianche 1, 20871 Vimercate (MB)',
    'Tel. ' + (pr.fisTel || '+39 039 62011') + '  |  ' + (pr.fisWeb || 'www.fischer.it'),
    'P.IVA ' + (pr.fisPiva || '')
  ].filter(x => x.trim() && x.trim() !== 'P.IVA ');
  fisLines.forEach((l, i) => doc.text(l, W - M, 16 + i * 7, { align: 'right' }));

  // Striscia grigia: titolo offerta
  doc.setFillColor(240, 240, 240);
  doc.rect(0, 46, W, 13, 'F');
  doc.setTextColor(227, 6, 19);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text('OFFERTA COMMERCIALE', M, 55);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(80, 80, 80);
  const dt = p.data ? new Date(p.data).toLocaleDateString('it-IT') : '—';
  doc.text('N° ' + (p.numero||'---') + '   |   Data: ' + dt, W - M, 55, { align: 'right' });

  let y = 67;

  // Oggetto
  if (p.oggetto) {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5); doc.setTextColor(30,30,30);
    doc.text('Oggetto: ' + p.oggetto, M, y); y += 9;
  }

  // Box cliente / agente
  const bW = (W - M*2 - 6) / 2;
  doc.setFillColor(248,248,248);
  doc.roundedRect(M, y-3, bW, 30, 2, 2, 'F');
  doc.roundedRect(M + bW + 6, y-3, bW, 30, 2, 2, 'F');

  // Cliente
  doc.setTextColor(227,6,19); doc.setFont('helvetica','bold'); doc.setFontSize(7);
  doc.text('DESTINATARIO', M+3, y+4);
  doc.setTextColor(20,20,20); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text(p.cliente?.nome||'—', M+3, y+11);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(70,70,70);
  const ca = [p.cliente?.ind, p.cliente?.city].filter(Boolean).join(', ');
  if(ca) doc.text(ca, M+3, y+17);
  const cc = [p.cliente?.tel, p.cliente?.email].filter(Boolean).join('  ');
  if(cc) doc.text(cc, M+3, y+23);
  if(p.cliente?.piva) doc.text('P.IVA: '+p.cliente.piva, M+3, y+(cc?29:23));

  // Agente
  const ax = M + bW + 9;
  doc.setTextColor(227,6,19); doc.setFont('helvetica','bold'); doc.setFontSize(7);
  doc.text('AGENTE DI RIFERIMENTO', ax, y+4);
  doc.setTextColor(20,20,20); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text(pr.agNome||'Fischer Italia', ax, y+11);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(70,70,70);
  if(pr.agTel) doc.text(pr.agTel, ax, y+17);
  if(pr.agEmail) doc.text(pr.agEmail, ax, y+23);
  if(pr.agZona) doc.text('Zona: ' + pr.agZona, ax, y+29);
  y += 38;

  // Tabella
  const rows = p.voci.map(v => {
    const q = parseFloat(v.qty)||0;
    const pr2 = parseFloat(v.prezzo)||0;
    return [v.desc||'', q%1===0?q.toString():q.toFixed(2), v.um||'PZ', '€ '+pr2.toFixed(2).replace('.',','), '€ '+(q*pr2).toFixed(2).replace('.',',')];
  });
  doc.autoTable({
    startY: y,
    head: [['DESCRIZIONE PRODOTTO', 'QTÀ', 'U.M.', 'PREZZO UNIT.', 'TOTALE']],
    body: rows,
    margin: { left: M, right: M },
    styles: { font:'helvetica', fontSize:8.5, cellPadding:3, textColor:[30,30,30] },
    headStyles: { fillColor:[227,6,19], textColor:[255,255,255], fontStyle:'bold', fontSize:8 },
    alternateRowStyles: { fillColor:[251,251,251] },
    columnStyles: {
      0: { cellWidth:'auto' },
      1: { halign:'center', cellWidth:14 },
      2: { halign:'center', cellWidth:14 },
      3: { halign:'right', cellWidth:28 },
      4: { halign:'right', cellWidth:30, fontStyle:'bold' }
    }
  });
  y = doc.lastAutoTable.finalY + 6;

  // Totali
  const lordo = p.lordo || p.voci.reduce((s,v)=>s+(parseFloat(v.qty)||0)*(parseFloat(v.prezzo)||0),0);
  const sc = p.sconto||0;
  const scVal = p.sconto_val != null ? p.sconto_val : lordo*sc/100;
  const imp = p.imponibile != null ? p.imponibile : lordo-scVal;
  const ivaP = p.iva||0;
  const iva = imp*ivaP/100;
  const tot = imp+iva;

  const tx = W - M - 74;
  const th = sc>0 ? 50 : 38;
  doc.setFillColor(248,248,248);
  doc.roundedRect(tx-3, y-2, 77, th, 2,2,'F');
  let ty = y+7;
  const tRow = (lbl, val, bold=false) => {
    doc.setFontSize(8.5);
    doc.setFont('helvetica', bold?'bold':'normal');
    doc.setTextColor(100,100,100); doc.text(lbl, tx, ty);
    doc.setTextColor(30,30,30); doc.text(val, tx+73, ty, {align:'right'});
    ty += 7;
  };
  tRow('Imponibile lordo:', '€ '+lordo.toFixed(2).replace('.',','));
  if(sc>0) {
    doc.setTextColor(198,40,40); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    doc.text('Sconto '+sc+'%:', tx, ty); doc.text('- € '+scVal.toFixed(2).replace('.',','), tx+73, ty, {align:'right'}); ty+=7;
    tRow('Imponibile netto:', '€ '+imp.toFixed(2).replace('.',','));
  }
  tRow('IVA '+ivaP+'%:', '€ '+iva.toFixed(2).replace('.',','));
  doc.setFillColor(227,6,19);
  doc.rect(tx-3, ty-5, 77, 12, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(255,255,255);
  doc.text('TOTALE:', tx, ty+4);
  doc.text('€ '+tot.toFixed(2).replace('.',','), tx+73, ty+4, {align:'right'});
  y = ty + 18;

  // Note
  if(y > 235) { doc.addPage(); y = 16; }
  const noteItems = [];
  if(p.validita) noteItems.push({t:'Validità offerta', v:p.validita});
  if(p.condizioni) noteItems.push({t:'Condizioni di pagamento', v:p.condizioni});
  if(p.note) noteItems.push({t:'Note', v:p.note});
  noteItems.forEach(item => {
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(227,6,19);
    doc.text(item.t.toUpperCase(), M, y); y+=4;
    doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60);
    const lines = doc.splitTextToSize(item.v, W-M*2);
    doc.text(lines, M, y); y += lines.length*4+5;
  });

  // Firme
  if(y < 250) {
    y = Math.max(y, 248);
    doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80);
    doc.text('Firma per accettazione:', M, y); doc.line(M, y+9, M+65, y+9);
    doc.text('Firma Fischer Italia:', W-M-65, y); doc.line(W-M-65, y+9, W-M, y+9);
  }

  // Footer rosso
  doc.setFillColor(227,6,19);
  doc.rect(0, 285, W, 12, 'F');
  doc.setFontSize(7); doc.setTextColor(255,255,255);
  doc.text('fischer Italia Srl  |  ' + (pr.fisInd||'Via Torri Bianche 1, 20871 Vimercate (MB)') + '  |  ' + (pr.fisWeb||'www.fischer.it'), W/2, 292, {align:'center'});

  const fname = 'Offerta_Fischer_' + (p.numero||p.id) + '_' + (p.cliente?.nome||'cliente').replace(/\s+/g,'_') + '.pdf';
  // data URI — unico metodo garantito su Safari iOS con file://
  const dataUri = doc.output('datauristring');
  mostraModalPDF(fname, dataUri);
}

function mostraModalPDF(fname, dataUri) {
  const old = document.getElementById('pdf-modal');
  if (old) old.remove();

  const modal = document.createElement('div');
  modal.id = 'pdf-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:flex-end;justify-content:center;';

  // Crea il contenuto del modal
  const sheet = document.createElement('div');
  sheet.style.cssText = 'background:#fff;border-radius:18px 18px 0 0;padding:20px 16px 36px;width:100%;max-width:500px;box-shadow:0 -4px 24px rgba(0,0,0,0.18);';
  sheet.innerHTML = `
    <div style="width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;"></div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;color:#E30613;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;">📄 PDF Pronto</div>
    <div style="font-size:0.82rem;color:#777;margin-bottom:18px;">${fname}</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div style="padding:12px 14px;background:#e8f5e9;border:1.5px solid #a5d6a7;border-radius:10px;font-size:0.8rem;color:#2e7d32;line-height:1.6;">
        <strong>📱 Su iPhone:</strong><br>
        Tocca <strong>"Apri PDF"</strong> qui sotto → si apre in Safari →<br>
        tocca <strong>↑</strong> in basso → scegli <strong>WhatsApp, AirDrop, Mail</strong>...
      </div>
    </div>`;

  // Bottone APRI PDF — vero tag <a> con data URI, Safari lo apre sempre
  const btnApri = document.createElement('a');
  btnApri.href = dataUri;
  btnApri.target = '_blank';
  btnApri.style.cssText = 'display:flex;align-items:center;gap:12px;padding:15px 14px;background:#E30613;border-radius:10px;text-decoration:none;margin-top:10px;';
  btnApri.innerHTML = `
    <span style="font-size:1.5rem;">📤</span>
    <div>
      <div style="font-weight:700;font-size:0.95rem;color:#fff;">Apri PDF</div>
      <div style="font-size:0.75rem;color:rgba(255,255,255,0.85);">Si apre in Safari → usa ↑ per condividere</div>
    </div>`;
  btnApri.addEventListener('click', function() {
    setTimeout(() => { const m=document.getElementById('pdf-modal'); if(m) m.remove(); }, 300);
  });

  // Bottone ANNULLA
  const btnAnnulla = document.createElement('button');
  btnAnnulla.textContent = 'Annulla';
  btnAnnulla.style.cssText = 'margin-top:10px;padding:12px;border-radius:10px;border:1.5px solid #ddd;background:#fff;font-family:Barlow,sans-serif;font-size:0.88rem;font-weight:600;color:#888;cursor:pointer;width:100%;';
  btnAnnulla.onclick = function() { modal.remove(); };

  sheet.querySelector('div:last-child').appendChild(btnApri);
  sheet.querySelector('div:last-child').appendChild(btnAnnulla);
  modal.appendChild(sheet);
  modal.addEventListener('click', function(e) { if(e.target===modal) modal.remove(); });
  document.body.appendChild(modal);
}

// ===== STORAGE =====
function getDB() { return JSON.parse(localStorage.getItem('fis_db') || '{"p":[],"prof":{}}'); }
function saveDB(db) { localStorage.setItem('fis_db', JSON.stringify(db)); }

// ===== PROFILO =====
function salvaProfilo() {
  const db = getDB();
  db.prof = {
    ...db.prof,
    agNome: document.getElementById('ag-nome').value,
    agEmail: document.getElementById('ag-email').value,
    agTel: document.getElementById('ag-tel').value,
    agZona: document.getElementById('ag-zona').value,
    fisInd: document.getElementById('fis-ind').value,
    fisTel: document.getElementById('fis-tel').value,
    fisWeb: document.getElementById('fis-web').value,
    fisPiva: document.getElementById('fis-piva').value,

  };

  toast('✅ Profilo salvato!', 'ok');

function caricaProfilo() {
  const db = getDB(); const pr = db.prof||{};
  const s = (id,v) => { const el=document.getElementById(id); if(el&&v!=null) el.value=v; };
  s('ag-nome',pr.agNome); s('ag-email',pr.agEmail); s('ag-tel',pr.agTel); s('ag-zona',pr.agZona);
  s('fis-ind',pr.fisInd||'Via Torri Bianche 1, 20871 Vimercate (MB)');
  s('fis-tel',pr.fisTel||'+39 039 62011'); s('fis-web',pr.fisWeb||'www.fischer.it');
  s('fis-piva',pr.fisPiva||''); s('cond-def',pr.condDef);
  s('n-pref',pr.nPref||'FIS-'); s('n-cnt',pr.nCnt||0);
}


// ===== PIN =====
let pinInput = '';
let pinMode = 'login'; // 'login' | 'setup' | 'confirm'
let pinTemp = '';

function initPin() {
  const saved = localStorage.getItem('fis_pin');
  const screen = document.getElementById('pin-screen');
  const app = document.getElementById('app-content');
  if (!saved) {
    // Primo avvio: setup PIN
    pinMode = 'setup';
    document.getElementById('pin-title').textContent = 'Crea il tuo PIN';
    document.getElementById('pin-sub').textContent = 'Scegli un PIN a 4 cifre per proteggere i tuoi dati';
    document.getElementById('pin-hint').textContent = 'Lo userai ogni volta che apri l\'app';
    screen.style.display = 'flex';
  } else {
    // Login
    pinMode = 'login';
    document.getElementById('pin-title').textContent = 'Inserisci PIN';
    document.getElementById('pin-sub').textContent = 'Accedi alla tua area personale';
    screen.style.display = 'flex';
  }
}

function pinDigit(d) {
  if (pinInput.length >= 4) return;
  pinInput += d;
  updateDots();
  if (pinInput.length === 4) {
    setTimeout(() => handlePin(), 120);
  }
}

function pinDel() {
  pinInput = pinInput.slice(0, -1);
  updateDots();
  document.getElementById('pin-error').textContent = '';
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    if (i < pinInput.length) dot.classList.add('filled');
    else dot.classList.remove('filled');
  }
}

function handlePin() {
  if (pinMode === 'setup') {
    pinTemp = pinInput;
    pinInput = '';
    updateDots();
    document.getElementById('pin-title').textContent = 'Conferma PIN';
    document.getElementById('pin-sub').textContent = 'Inserisci di nuovo il PIN scelto';
    document.getElementById('pin-hint').textContent = '';
    pinMode = 'confirm';
  } else if (pinMode === 'confirm') {
    if (pinInput === pinTemp) {
      localStorage.setItem('fis_pin', pinInput);
      sblocca();
    } else {
      document.getElementById('pin-error').textContent = 'I PIN non coincidono. Riprova.';
      pinInput = ''; pinTemp = '';
      updateDots();
      pinMode = 'setup';
      document.getElementById('pin-title').textContent = 'Crea il tuo PIN';
      document.getElementById('pin-sub').textContent = 'Scegli un PIN a 4 cifre';
    }
  } else {
    // login
    const saved = localStorage.getItem('fis_pin');
    if (pinInput === saved) {
      sblocca();
    } else {
      document.getElementById('pin-error').textContent = 'PIN errato. Riprova.';
      pinInput = '';
      updateDots();
    }
  }
}

function sblocca() {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';
}


// ===== TOAST =====
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (type?' '+type:'');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ===== INIT =====
window.onload = () => {
  initPin();
  caricaProfilo();
  renderLista();
  addVoce();
  document.getElementById('data-prev').value = new Date().toISOString().split('T')[0];
  const db = getDB();
  const pref = db.prof.nPref || 'FIS-';
  const cnt = (parseInt(db.prof.nCnt)||0) + 1;
  document.getElementById('num-prev').value = pref + String(cnt).padStart(4,'0');
  if (db.prof.condDef) document.getElementById('cond-prev').value = db.prof.condDef;
};
